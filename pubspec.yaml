name: iptv_app
description: Flutter IPTV player with Xtreme Codes login support.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  http: ^1.1.2
  video_player: ^2.8.2
  video_player_web_hls: ^1.2.2
  chewie: ^1.7.4
  fvp: ^0.35.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
